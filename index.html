<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RideEase Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      body {
        background-image: url("./images/welcome.jpg");
        background-size: cover;
        background-position: center;
        background-repeat: no-repeat;
        backdrop-filter: blur(4px);
        -webkit-backdrop-filter: blur(4px);
      }
    </style>
  </head>
  <body
    class="min-h-screen flex items-center justify-center text-white font-sans"
  >
    <div
      class="bg-black bg-opacity-60 p-8 rounded-xl shadow-md w-full max-w-md text-center"
    >
      <img
        src="./images/mylogo.jpg"
        alt="RideEase Logo"
        class="w-20 h-20 mx-auto mb-4 rounded-full shadow-lg"
      />
      <h1 class="text-3xl font-bold mb-6">Welcome to RideEase 🚗</h1>
      <p class="text-sm mb-6">Find and offer rides easily</p>

      <form id="loginForm" class="space-y-4">
        <input
          type="email"
          id="email"
          placeholder="Email"
          required
          class="w-full px-4 py-2 rounded bg-white text-black border border-gray-300 focus:outline-none"
        />
        <input
          type="password"
          id="password"
          placeholder="Password"
          required
          class="w-full px-4 py-2 rounded bg-white text-black border border-gray-300 focus:outline-none"
        />
        <button
          type="submit"
          class="w-full bg-blue-600 hover:bg-blue-800 text-white py-2 rounded font-semibold"
        >
          Login
        </button>
      </form>
    </div>

    <script>
      document
        .getElementById("loginForm")
        ?.addEventListener("submit", async (e) => {
          e.preventDefault();
          const email = document.getElementById("email").value.trim();
          const password = document.getElementById("password").value.trim();

          try {
            const res = await fetch("http://localhost:5000/auth/login", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ email, password }),
            });

            const data = await res.json();

            if (res.ok) {
              localStorage.setItem("user", JSON.stringify(data));
              window.location.href = "app.html";
            } else {
              alert(data.message || "Login failed");
            }
          } catch (err) {
            console.error("❌ Connection error:", err);
            alert("❌ Error connecting to server");
          }
        });
    </script>
  </body>
</html>
